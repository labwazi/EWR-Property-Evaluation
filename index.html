<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mauritius AI Rental Estimator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family: Arial, sans-serif;
margin:0;
background:#0f172a;
color:white;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

h1{
text-align:center;
color:#fbbf24;
}

label{
display:block;
margin-top:15px;
font-weight:bold;
}

select,input{
width:100%;
padding:10px;
margin-top:5px;
border-radius:8px;
border:none;
}

.result{
margin-top:20px;
padding:15px;
background:#0b1220;
border-radius:10px;
text-align:center;
}

.big{
font-size:28px;
color:#22c55e;
font-weight:bold;
}

.small{
color:#94a3b8;
}

button{
width:100%;
padding:15px;
margin-top:20px;
background:#25D366;
border:none;
color:white;
font-size:16px;
border-radius:10px;
cursor:pointer;
}

button:hover{
background:#1ea952;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h1>🏠 Mauritius AI Rental Estimator</h1>

<label>Town / Area</label>
<select id="town">
<option>Port Louis</option>
<option>Curepipe</option>
<option>Vacoas</option>
<option>Quatre Bornes</option>
<option>Rose Hill</option>
<option>Ebene</option>
<option>Grand Baie</option>
<option>Flic en Flac</option>
<option>Tamarin</option>
<option>Triolet</option>
<option>Flacq</option>
<option>Mahebourg</option>
</select>

<label>Property Type</label>
<select id="type">
<option value="studio">Studio</option>
<option value="2br">2 Bedroom</option>
<option value="3br">3 Bedroom</option>
<option value="villa">Villa</option>
</select>

<label>Furnished</label>
<select id="furnished">
<option value="no">Unfurnished</option>
<option value="yes">Furnished</option>
</select>

<label>Extras</label>
<select id="extras">
<option value="0">None</option>
<option value="2000">Parking</option>
<option value="4000">Parking + AC</option>
<option value="8000">Sea View / Premium</option>
</select>

<div class="result">
<div class="small">Estimated Monthly Rent</div>
<div class="big" id="price">Rs 0</div>
<div id="confidence" class="small"></div>
</div>

<button onclick="whatsapp()">
📲 Get Professional Valuation on WhatsApp
</button>

</div>
</div>

<script>

// BASE MARKET DATA (FROM YOUR INPUT)
const data = {
"Port Louis": {
studio:10000,
"2br":14000,
"3br":15000,
"3br_f":20000
},
"Curepipe":{
"2br":15000
},
"Grand Baie":{
"2br":22000,
"2br_lux":28000,
villa:65000
},
"Vacoas":{
studio:8000,
"2br":15000,
"3br":18000
},
"Quatre Bornes":{
"2br":16000,
"3br":19000
},
"Flic en Flac":{
"2br":20000,
villa:55000
}
};

function calculate(){

let town = document.getElementById("town").value;
let type = document.getElementById("type").value;
let furnished = document.getElementById("furnished").value;
let extras = parseInt(document.getElementById("extras").value);

let base = 12000;

// try find specific match
if(data[town] && data[town][type]){
base = data[town][type];
}

// adjustments
if(furnished === "yes"){
base += 3000;
}

base += extras;

// confidence logic
let confidence = "Medium";

if(base > 30000){
confidence = "High (Luxury Market)";
}
if(base < 12000){
confidence = "Low (Budget Segment)";
}

document.getElementById("price").innerText =
"Rs " + base.toLocaleString();

document.getElementById("confidence").innerText =
"AI Confidence: " + confidence;

}

function whatsapp(){
let msg = encodeURIComponent("Hello, I want a full rental valuation for my property.");
window.open("https://wa.me/23059237053?text=" + msg, "_blank");
}

document.querySelectorAll("select").forEach(e=>{
e.addEventListener("change",calculate);
});

calculate();

</script>

</body>
</html>
